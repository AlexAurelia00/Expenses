# Sample Render manifest to deploy frontend (static site) and backend (web service).
# Edit names, plan, and repo settings as needed before applying in Render.

services:
  - type: web
    name: splitwise-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci && npm run build-frontend
    startCommand: cd backend && npm start
    env:
      - key: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
      - key: SUPABASE_SERVICE_ROLE_KEY
      - key: NODE_ENV
      - key: VITE_API_BASE
        value: /api
